name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Set up Python"
        uses: actions/setup-python@v6
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build packages for PyPI
        run: |
          uv build --package bmh
          uv build --package bmh_jmetalpy_extensions
          uv build --package blending_simulator_lib --sdist

      - name: Build manylinux wheels for blending_simulator_lib
        uses: pypa/cibuildwheel@v2.21.3
        env:
          CIBW_BUILD: "cp312-manylinux_x86_64"
          CIBW_OUTPUT_DIR: dist  # Ensure they land where uv publish looks
        with:
          package-dir: libraries/blending_simulator_lib

      - name: Publish to PyPI
        run: uv publish

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            dist/*
