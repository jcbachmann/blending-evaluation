name: Release to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    permissions:
      # Required for Trusted Publishers
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build blending_simulator_lib
        run: |
          cd libraries/blending_simulator_lib
          uv build

      - name: Build bmh_jmetalpy_extensions
        run: |
          cd libraries/bmh_jmetalpy_extensions
          uv build

      - name: Build bmh
        run: |
          cd libraries/bmh
          uv build

      - name: Publish blending_simulator_lib
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libraries/blending_simulator_lib/dist/

      - name: Publish bmh_jmetalpy_extensions
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libraries/bmh_jmetalpy_extensions/dist/

      - name: Publish bmh
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: libraries/bmh/dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          generate_release_notes: true
          files: |
            libraries/blending_simulator_lib/dist/*
            libraries/bmh_jmetalpy_extensions/dist/*
            libraries/bmh/dist/*
